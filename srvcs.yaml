schemaVersion: 1
name: "srvcs-disjoint"
slug: "disjoint"
repository: "srvcs/disjoint"
package: "srvcs-disjoint"
function: "sets: do the sets share no elements"
kind: "orchestrator"
categories:
  - "sets"
dependencies:
  - slug: "intersection"
    service: "srvcs-intersection"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "json[]"
    required: true
  - name: "b"
    type: "json[]"
    required: true
outputs:
  - name: "a"
    type: "json[]"
  - name: "b"
    type: "json[]"
  - name: "result"
    type: "boolean"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_INTERSECTION_URL"
    default: ""
    purpose: "Base URL for srvcs-intersection"
